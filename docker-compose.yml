services:
  app:
    build: .
    ports:
      - "3000:3000"
    restart: always
    environment:
      - DATABASE_URL=postgres://calendar_user:calendar_pass@db:5432/calendar_db
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=calendar_user
      - POSTGRES_PASSWORD=calendar_pass
      - POSTGRES_DB=calendar_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
